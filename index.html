<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunPromo | AI Smart Coupon Finder</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .date-picker-transition { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); margin-top: 0; border-color: transparent; }
        .date-picker-visible { max-height: 250px; opacity: 1; margin-top: 1rem; border-color: #f1f5f9; }
        @keyframes slideInUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .deal-card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .deal-card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border-color: #93c5fd; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col">

    <nav class="glass-effect sticky top-0 z-50 border-b border-slate-200 px-4 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-700 tracking-tight">RunPromo</h1>
            </div>
            
            <div class="hidden md:flex space-x-8 font-medium text-sm text-slate-600">
                <a href="#searchArea" class="hover:text-blue-600 transition-colors">Run Search</a>
                <a href="#howItWorks" class="hover:text-blue-600 transition-colors">How it Works</a>
                <a href="shipping.html" class="hover:text-blue-600 transition-colors flex items-center gap-1.5">
                    Compare Shipping
                    <span class="bg-green-100 text-green-700 text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest shadow-sm">New</span>
                </a>
            </div>
        </div>
    </nav>

    <main id="searchArea" class="flex-grow max-w-6xl mx-auto px-4 py-16 md:py-20 w-full">
        <div class="max-w-3xl mx-auto text-center mb-10">
            <div class="inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 font-semibold px-5 py-2 rounded-full text-sm mb-8 border border-indigo-100 animate-float shadow-sm">
                <i class="fa-solid fa-robot text-blue-500 fa-beat"></i> Powered by OpenAI
            </div>

            <h2 class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-6 leading-tight">
                Stop paying full price <br class="hidden md:block"/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">ever again.</span>
            </h2>
            
            <div class="flex justify-center items-center gap-2 md:gap-3 mb-6 relative z-20 flex-wrap">
                <button id="tabShopping" onclick="switchMode('shopping')" class="bg-blue-600 text-white border border-blue-600 font-bold py-2.5 px-6 rounded-full shadow-md transition-all flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-bag-shopping"></i> E-Commerce
                </button>
                <button id="tabTravel" onclick="switchMode('travel')" class="bg-white text-slate-600 hover:text-blue-600 border border-slate-200 font-bold py-2.5 px-6 rounded-full shadow-sm transition-all flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-plane-departure"></i> Travel & Hotels
                </button>
            </div>

            <div class="bg-white p-3 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-slate-200 relative z-10 transition-all duration-300">
                <div class="flex flex-col md:flex-row gap-2">
                    <div class="flex-1 flex items-center px-5 py-4 bg-slate-50 rounded-2xl border border-transparent focus-within:border-blue-300 focus-within:bg-white transition-all relative">
                        <i id="inputIcon" class="fa-solid fa-link text-blue-500 mr-3 text-lg"></i>
                        <input id="productLink" type="text" placeholder="Paste link from Shopee, Lazada, Amazon..." class="w-full bg-transparent border-none outline-none text-slate-700 placeholder-slate-400 text-base md:text-lg pr-[90px]" oninput="detectRegion()">
                        
                        <div class="absolute right-4 flex items-center gap-2">
                            <button id="clearBtn" onclick="clearInput()" class="hidden text-slate-400 hover:text-red-500 transition-colors p-1" title="Clear input">
                                <i class="fa-solid fa-circle-xmark text-lg"></i>
                            </button>
                            <div id="regionIndicator" class="hidden items-center gap-1.5 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-200 text-xs font-bold text-slate-600 transition-all">
                                <span id="regionFlag">🇹🇭</span>
                                <span id="regionCurrency">THB</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="processLink()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-3 text-lg whitespace-nowrap md:w-auto">
                        <span id="btnText">AI Search</span>
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </div>

                <div id="dateNotice" class="hidden mt-3 text-xs font-bold text-green-600 bg-green-50 py-1.5 px-3 rounded-full inline-flex items-center gap-1.5 border border-green-200">
                    <i class="fa-solid fa-check-circle"></i> Travel dates automatically detected from link!
                </div>

                <div id="datePickers" class="date-picker-transition flex flex-col md:flex-row items-center justify-center gap-3 border-t border-slate-100 pt-4">
                    <div class="flex items-center gap-2 text-sm font-bold text-slate-600 w-full md:w-auto">
                        <i class="fa-regular fa-calendar-check text-indigo-500 w-4"></i>
                        <input type="date" id="checkInDate" class="bg-slate-50 border border-slate-200 text-slate-700 px-3 py-2 rounded-xl outline-none focus:border-indigo-400 transition-colors w-full md:w-auto cursor-pointer" placeholder="Check-in">
                    </div>
                    <div class="hidden md:block text-slate-300"><i class="fa-solid fa-arrow-right"></i></div>
                    <div class="flex items-center gap-2 text-sm font-bold text-slate-600 w-full md:w-auto">
                        <i class="fa-regular fa-calendar-xmark text-indigo-500 w-4"></i>
                        <input type="date" id="checkOutDate" class="bg-slate-50 border border-slate-200 text-slate-700 px-3 py-2 rounded-xl outline-none focus:border-indigo-400 transition-colors w-full md:w-auto cursor-pointer" placeholder="Check-out">
                    </div>
                    <div class="hidden md:block w-px h-6 bg-slate-200 mx-2"></div>
                    <div class="flex items-center gap-2 text-sm font-bold text-slate-600 w-full md:w-auto">
                        <i class="fa-solid fa-user-group text-indigo-500 w-4"></i>
                        <select id="guestCount" class="bg-slate-50 border border-slate-200 text-slate-700 px-3 py-2 rounded-xl outline-none focus:border-indigo-400 transition-colors w-full md:w-auto cursor-pointer">
                            <option value="1">1 Adult</option>
                            <option value="2" selected>2 Adults, 1 Room</option>
                            <option value="4">4+ Adults</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="loadingState" class="hidden max-w-2xl mx-auto bg-white rounded-2xl shadow-xl border border-blue-100 p-8 text-center mt-12 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-indigo-500 to-blue-500 bg-[length:200%_100%] animate-[gradient_2s_linear_infinite]"></div>
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-blue-600 mb-6">
                <i class="fa-solid fa-robot fa-bounce text-3xl"></i>
            </div>
            <h3 id="loadingTitle" class="text-2xl font-bold text-slate-900 mb-2">AI is analyzing your link...</h3>
            <p id="loadingSubtitle" class="text-sm text-slate-400 mb-4 h-5">Connecting to OpenAI...</p>
        </div>

        <div id="unifiedResultsCard" class="hidden max-w-4xl mx-auto mt-12 transform transition-all">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-6 md:p-8 relative overflow-hidden">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <div class="inline-flex items-center gap-2 bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full mb-3 uppercase tracking-wide">
                            <i class="fa-solid fa-shield-check"></i> Verified Optimization
                        </div>
                        <h3 class="text-2xl font-extrabold text-slate-900 tracking-tight" id="resultTitle">Best Available Rates</h3>
                    </div>
                </div>
                <div id="unifiedComparisonList" class="flex flex-col"></div>
            </div>
            <button onclick="resetSearch()" class="w-full mt-8 text-slate-500 hover:text-blue-600 font-bold text-sm transition-colors flex justify-center items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Search Another Link
            </button>
        </div>
    </main>

    <script>
        let currentMode = 'shopping';
        let currentCurrencySymbol = '$';
        let redirectUrl = ''; 
        let isTravelLink = false;
        let hasDatesInUrl = false;

        function switchMode(mode) {
            currentMode = mode;
            const tabShopping = document.getElementById('tabShopping');
            const tabTravel = document.getElementById('tabTravel');
            const inputIcon = document.getElementById('inputIcon');
            const productLink = document.getElementById('productLink');
            const datePickers = document.getElementById('datePickers');
            const dateNotice = document.getElementById('dateNotice');

            tabShopping.className = "bg-white text-slate-600 hover:text-blue-600 border border-slate-200 hover:border-blue-300 font-bold py-2.5 px-6 rounded-full shadow-sm transition-all flex items-center gap-2 text-sm";
            tabTravel.className = "bg-white text-slate-600 hover:text-blue-600 border border-slate-200 hover:border-blue-300 font-bold py-2.5 px-6 rounded-full shadow-sm transition-all flex items-center gap-2 text-sm";
            
            datePickers.classList.remove('date-picker-visible');
            dateNotice.classList.add('hidden');

            if (mode === 'shopping') {
                tabShopping.className = "bg-blue-600 text-white border border-blue-600 font-bold py-2.5 px-6 rounded-full shadow-md transition-all flex items-center gap-2 text-sm";
                inputIcon.className = "fa-solid fa-bag-shopping text-blue-500 mr-3 text-lg";
                productLink.placeholder = "Paste link from Shopee, Lazada, Amazon...";
            } else if (mode === 'travel') {
                tabTravel.className = "bg-blue-600 text-white border border-blue-600 font-bold py-2.5 px-6 rounded-full shadow-md transition-all flex items-center gap-2 text-sm";
                inputIcon.className = "fa-solid fa-plane-departure text-blue-500 mr-3 text-lg";
                productLink.placeholder = "Paste Agoda, Booking.com, or Expedia link...";
                if (!hasDatesInUrl) datePickers.classList.add('date-picker-visible');
                else dateNotice.classList.remove('hidden');
            }
        }

        function clearInput() {
            document.getElementById('productLink').value = '';
            detectRegion(); 
            document.getElementById('productLink').focus();
        }

        function resetSearch() {
            clearInput();
            document.getElementById('unifiedResultsCard').classList.add('hidden');
            document.getElementById('searchArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function detectRegion() {
            const input = document.getElementById('productLink').value.toLowerCase().trim();
            const indicator = document.getElementById('regionIndicator');
            const clearBtn = document.getElementById('clearBtn');
            const flag = document.getElementById('regionFlag');
            const currencyTxt = document.getElementById('regionCurrency');

            if (input.length === 0) {
                indicator.classList.add('hidden'); clearBtn.classList.add('hidden'); 
                hasDatesInUrl = false;
                document.getElementById('dateNotice').classList.add('hidden');
                if (currentMode === 'travel') document.getElementById('datePickers').classList.add('date-picker-visible');
                return;
            }
            indicator.classList.remove('hidden'); indicator.classList.add('flex'); clearBtn.classList.remove('hidden');
            
            const travelDomains = ['agoda', 'booking', 'skyscanner', 'trip', 'expedia', 'hotel', 'flight'];
            isTravelLink = travelDomains.some(domain => input.includes(domain)) || currentMode === 'travel';

            if (isTravelLink) {
                const dateRegex = /\b(202\d-\d{2}-\d{2}|\d{2}-\d{2}-202\d|checkin|checkout|dep|arr)\b/i;
                hasDatesInUrl = dateRegex.test(input);
                if (hasDatesInUrl) {
                    document.getElementById('datePickers').classList.remove('date-picker-visible');
                    document.getElementById('dateNotice').classList.remove('hidden');
                } else {
                    document.getElementById('datePickers').classList.add('date-picker-visible');
                    document.getElementById('dateNotice').classList.add('hidden');
                }
            }

            if (input.includes('.th')) { flag.innerText = '🇹🇭'; currencyTxt.innerText = 'THB'; currentCurrencySymbol = '฿'; } 
            else if (input.includes('.sg')) { flag.innerText = '🇸🇬'; currencyTxt.innerText = 'SGD'; currentCurrencySymbol = 'S$'; } 
            else if (input.includes('.my')) { flag.innerText = '🇲🇾'; currencyTxt.innerText = 'MYR'; currentCurrencySymbol = 'RM'; } 
            else { flag.innerText = '🌐'; currencyTxt.innerText = 'USD'; currentCurrencySymbol = '$'; }
        }

        function renderUnifiedData(data) {
            const multi = currentCurrencySymbol === '$' ? 1 : (currentCurrencySymbol === '฿' ? 35 : 4);
            const formatNum = (num) => Math.round(num).toLocaleString();
            
            const checkInVal = document.getElementById('checkInDate').value || '';
            const checkOutVal = document.getElementById('checkOutDate').value || '';
            
            document.getElementById('resultTitle').innerText = data.metaTitle || "Best Available Rates";

            let prices = data.comparablePrices || [];
            const sorted = prices.sort((a,b) => a.priceUSD - b.priceUSD);
            const listContainer = document.getElementById('unifiedComparisonList');
            listContainer.innerHTML = ''; 

            sorted.forEach((comp, index) => {
                const compDomain = comp.ota.toLowerCase().replace(/\s+/g, '') + (comp.ota.toLowerCase().includes('.com') ? '' : '.com');
                const priceText = `${currentCurrencySymbol}${formatNum(comp.priceUSD * multi)}`;
                const logoUrl = `https://www.google.com/s2/favicons?sz=128&domain=${compDomain}`;

                // Route through our custom deep-link redirector
                let finalLink = `https://runpromo-backend.vercel.app/api/redirect?ota=${encodeURIComponent(comp.ota)}&query=${encodeURIComponent(data.metaTitle)}&checkin=${checkInVal}&checkout=${checkOutVal}`;
                
                let mainCTA = data.type === 'travel' ? 'Check Live Rate' : 'Lock in Deal';
                let subCTA = data.type === 'travel' ? 'Check Dates' : 'View Deal';

                if (index === 0) {
                    listContainer.innerHTML += `
                        <div class="bg-gradient-to-br from-blue-50 to-indigo-50/50 border border-blue-100 rounded-3xl p-1 relative overflow-hidden deal-card-hover cursor-pointer mb-6 shadow-sm">
                            <div class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded-bl-xl uppercase tracking-widest z-10">🏆 AI Top Pick</div>
                            <div class="bg-white/90 backdrop-blur-sm rounded-[22px] p-5">
                                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4" onclick="window.open('${finalLink}', '_blank')">
                                    <div class="flex items-center gap-4">
                                        <div class="w-14 h-14 bg-white rounded-2xl shadow-sm border border-slate-100 flex items-center justify-center p-2.5">
                                            <img src="${logoUrl}" class="w-full h-full object-contain" onerror="this.src='https://placehold.co/128x128/ffffff/000000?text=${comp.ota.charAt(0)}'">
                                        </div>
                                        <div>
                                            <h4 class="text-xl font-bold text-slate-900">${comp.ota}</h4>
                                            <div class="flex items-center gap-2 text-xs text-slate-500 mt-0.5"><i class="fa-solid fa-check-circle text-green-500"></i> Verified Partner</div>
                                        </div>
                                    </div>
                                    <div class="flex items-center md:items-end flex-row md:flex-col justify-between w-full md:w-auto">
                                        <span class="text-3xl font-black text-blue-700">${priceText}</span>
                                        <button class="bg-blue-600 text-white font-bold py-2.5 px-6 rounded-xl shadow-lg mt-2">${mainCTA}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    listContainer.innerHTML += `
                        <div onclick="window.open('${finalLink}', '_blank')" class="bg-white rounded-2xl p-4 border border-slate-100 flex items-center justify-between hover:border-blue-300 hover:shadow-md cursor-pointer transition-all mb-3 group">
                            <div class="flex items-center gap-4">
                                <img src="${logoUrl}" class="w-8 h-8 object-contain" onerror="this.src='https://placehold.co/128x128/ffffff/000000?text=${comp.ota.charAt(0)}'">
                                <span class="font-bold text-slate-800">${comp.ota}</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-lg font-black text-slate-700">${priceText}</span>
                                <button class="bg-white border border-slate-200 text-slate-600 font-bold text-[12px] px-3 py-1.5 rounded-lg hidden md:block">${subCTA}</button>
                            </div>
                        </div>
                    `;
                }
            });
            
            // Add the "See More Options" button at the bottom
            let searchCategory = data.type === 'travel' ? 'Hotels & Flights' : 'Shopping Stores';
            listContainer.innerHTML += `
                <div class="mt-4 text-center">
                    <button class="text-slate-500 hover:text-blue-600 text-sm font-semibold transition-colors flex items-center justify-center gap-2 w-full py-2">
                        <i class="fa-solid fa-chevron-down"></i> See 15+ more ${searchCategory}
                    </button>
                </div>
            `;
        }

        async function processLink() {
            let inputUrl = document.getElementById('productLink').value.trim();
            if(!inputUrl) return;
            
            redirectUrl = inputUrl.startsWith('http') ? inputUrl : 'https://' + inputUrl;
            document.getElementById('unifiedResultsCard').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');

            try {
                const response = await fetch('https://runpromo-backend.vercel.app/api/optimize-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUrl: redirectUrl })
                });

                const data = await response.json();
                renderUnifiedData(data);
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('unifiedResultsCard').classList.remove('hidden');

            } catch (error) {
                console.log("Error contacting backend.");
                document.getElementById('loadingTitle').innerText = "Oops, something went wrong.";
                document.getElementById('loadingSubtitle').innerText = "Please try again later.";
            }
        }
    </script>
</body>
</html>
