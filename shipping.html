<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunPromo | AI Global Shipping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-4 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold"><i class="fa-solid fa-bolt"></i></div>
                <h1 class="text-2xl font-extrabold text-blue-700">RunPromo</h1>
            </a>
            <div class="hidden md:flex space-x-8 font-medium text-sm text-slate-600">
                <a href="index.html" class="hover:text-blue-600">Find Coupons</a>
                <a href="shipping.html" class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1">AI Shipping</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-4 py-12 w-full">
        <div class="text-center mb-10">
            <h2 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4">AI Logistics Engine</h2>
            <p class="text-lg text-slate-500">Paste any product link. Our AI will analyze the item, estimate weight, and query global couriers to find the cheapest route to your country.</p>
        </div>

        <div class="bg-white p-3 rounded-[2rem] shadow-lg border border-slate-200 flex flex-col md:flex-row gap-3">
            <div class="flex-1 flex items-center px-5 py-4 bg-slate-50 rounded-2xl">
                <i class="fa-solid fa-link text-slate-400 mr-3"></i>
                <input id="productUrl" type="url" placeholder="Paste link (Taobao, AliExpress, Amazon)..." class="w-full bg-transparent border-none outline-none">
            </div>
            <div class="md:w-64 flex items-center px-5 py-4 bg-slate-50 rounded-2xl">
                <i class="fa-solid fa-location-dot text-slate-400 mr-3"></i>
                <select id="destination" class="w-full bg-transparent outline-none cursor-pointer">
                    <option value="Cambodia">Cambodia</option>
                    <option value="Philippines">Philippines</option>
                    <option value="Malaysia">Malaysia</option>
                    <option value="United States">United States</option>
                </select>
            </div>
            <button onclick="runAIShipping()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-2xl flex items-center justify-center gap-3">
                <span>Estimate AI Rates</span>
            </button>
        </div>

        <div id="loadingState" class="hidden text-center mt-12 bg-white p-8 rounded-3xl shadow-xl">
            <i class="fa-solid fa-robot fa-bounce text-4xl text-blue-600 mb-4"></i>
            <h3 class="text-2xl font-bold">AI is calculating weight & logistics...</h3>
        </div>

        <div id="resultsCard" class="hidden mt-12 bg-white rounded-3xl shadow-xl overflow-hidden">
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold">Rates for: <span id="displayItem" class="text-blue-400"></span></h3>
                    <p class="text-slate-400 text-sm">Estimated Weight: <span id="displayWeight" class="text-white"></span>kg to <span id="displayDest"></span></p>
                </div>
            </div>
            <table class="w-full text-left">
                <tbody id="resultsBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </main>

    <script>
        async function runAIShipping() {
            const urlInput = document.getElementById('productUrl').value;
            const destInput = document.getElementById('destination').value;
            if (!urlInput) return;
            
            document.getElementById('resultsCard').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            
            try {
                const response = await fetch('https://runpromo-backend.vercel.app/api/shipping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUrl: urlInput, destination: destInput })
                });

                const data = await response.json();
                
                document.getElementById('displayItem').innerText = data.productName;
                document.getElementById('displayWeight').innerText = data.weightKG;
                document.getElementById('displayDest').innerText = destInput;
                
                const tbody = document.getElementById('resultsBody');
                tbody.innerHTML = '';

                data.rates.forEach(carrier => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-blue-50 transition-colors">
                            <td class="p-5 font-bold text-slate-800">${carrier.carrier}<br><span class="text-xs text-slate-500 font-normal">${carrier.speed}</span></td>
                            <td class="p-5 text-right font-black text-xl">$${carrier.priceUSD}</td>
                        </tr>
                    `;
                });
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resultsCard').classList.remove('hidden');
            } catch (e) {
                console.log("Error querying OpenAI Shipping model.");
            }
        }
    </script>
</body>
</html>
